<!DOCTYPE html>
<html lang="en">
    <head>
        <title>my journal</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1 class="text1">MY JOURNAL</h1>
        <div id="textarea-container">

              <textarea id="journal" placeholder="start writing your thoughts here......"></textarea>

            </div>

            </div>
        </div>
        
        <script src="script.js" defer></script>
    </body>
</html>
